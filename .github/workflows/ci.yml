name: CI

on:
  push:
    branches:
      - main
      - '*-stable'
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        gemfile:
          - Gemfile
        ruby:
          - "3.1"
          - "3.2"
          - "3.3"
    env:
      BUNDLE_GEMFILE: ${{ matrix.gemfile }}
    name: "Tests: Ruby ${{ matrix.ruby }} ${{ matrix.gemfile }}"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Deletes Gemfile.lock
        run: rm Gemfile.lock
      - name: Set up Ruby ${{ matrix.ruby }}
        uses: ruby/setup-ruby@c4e5b1316158f92e3d49443a9d58b31d25ac0f8f # v1.306.0
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Run tests
        run: bin/rake test
  loading-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        gemfile:
          - Gemfile
        ruby:
          - "3.1"
          - "3.2"
    env:
      BUNDLE_GEMFILE: ${{ matrix.gemfile }}
    name: "Loading Tests: Ruby ${{ matrix.ruby }} ${{ matrix.gemfile }}"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Delete Gemfile.lock
        run: rm Gemfile.lock
      - name: Set up Ruby ${{ matrix.ruby }}
        uses: ruby/setup-ruby@c4e5b1316158f92e3d49443a9d58b31d25ac0f8f # v1.306.0
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Run tests
        run: bin/rake test:loading
  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Ruby
        uses: ruby/setup-ruby@c4e5b1316158f92e3d49443a9d58b31d25ac0f8f # v1.306.0
        with:
          bundler-cache: true
      - name: Run style checks
        run: bin/rubocop
  static_type_checking:
    runs-on: ubuntu-latest
    name: Type Checking
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Ruby
        uses: ruby/setup-ruby@c4e5b1316158f92e3d49443a9d58b31d25ac0f8f # v1.306.0
        with:
          bundler-cache: true
      - name: Run static type checks
        run: bin/srb tc
  buildall:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    name: Build (matrix)
    needs: [lint, tests, static_type_checking]
    steps:
      - name: Check build matrix status
        if: ${{ needs.tests.result != 'success' || needs.lint.result != 'success' || needs.static_type_checking.result != 'success' }}
        run: exit 1
